name: CI

on:
  push:
    branches: [master]
# trigger rebuild 2
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [17, 21]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: 'maven'
      - run: mvn clean package

      - name: Check jar contents
        if: matrix.java-version == 17
        run: |
          ls -la target/
          unzip -p target/myproject-0.0.1-SNAPSHOT.jar BOOT-INF/lib/spring-boot-*.jar 2>/dev/null | strings | grep "Spring Boot" | head -3
      
      # 只在 Java 17 上构建和推送镜像，避免重复推两次
      - name: Login to Docker Hub
        if: matrix.java-version == 17
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        if: matrix.java-version == 17
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/hello-world:${{ github.sha }}
